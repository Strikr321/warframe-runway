<div class="recent-section">
  <div class="section-label">Recently Edited</div>
  <div class="recent-row">
    @for (l of loadouts(); track l.id) {
      <div class="recent-card" (click)="open.emit(l)">
        <div class="recent-card-frame">{{ l.frame }}</div>
        <div class="recent-card-name">{{ l.name }}</div>
        <div class="recent-card-colors">
          @for (c of l.colors; track $index) {
            <div class="recent-color-dot" [style.background]="c"></div>
          }
        </div>
        <!-- The pipe: raw ISO timestamp in, human words out -->
        <div class="recent-card-time">{{ l.edited | timeAgo }}</div>
      </div>
    }
  </div>
</div>
