<!-- Data flows DOWN via [inputs], events bubble UP via (outputs). -->

<app-stats-banner
  [styled]="stats().styled"
  [total]="stats().total"
  [loadouts]="stats().loadouts"
  [favorites]="stats().favorites"
/>

<!-- Empty state: a fresh browser has zero loadouts now that data is real -->
@if (loadouts().length === 0) {
  <div class="empty-banner">
    <div class="empty-title">No loadouts yet</div>
    <p>Explore with sample data, or head to the Builder to create your first one.</p>
    <button class="seed-btn" (click)="seedDemo()">Load Sample Loadouts</button>
  </div>
} @else {
  <app-recent-row
    [loadouts]="recent()"
    [highlightedFrame]="hoveredFrame()"
    (open)="openLoadoutById($event.id)"
    (hoverChange)="onRecentHover($event)"
  />
}

<app-controls-bar
  (viewChange)="view.set($event)"
  (searchChange)="search.set($event)"
  (filterChange)="filter.set($event)"
/>

<div class="card-grid">
  <div class="card-slot">
    <div class="create-card" (click)="createForFrame()">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <div class="create-card-label">New Loadout</div>
    </div>
  </div>

  @if (view() === 'frame') {
    @for (frame of filteredFrames(); track frame) {
      <app-frame-card
        [frame]="frame"
        [loadouts]="loadoutsFor(frame)"
        [highlighted]="hoveredFrame() === frame"
        (openLoadout)="openLoadoutById($event)"
        (createRequested)="createForFrame(frame)"
        (toggleFav)="toggleFav(frame)"
        (hoverChange)="onFrameHover(frame, $event)"
      />
    }
  } @else {
    @for (l of filteredLoadouts(); track l.id) {
      <app-frame-card
        [frame]="l.frame"
        [loadouts]="[l]"
        [badge]="false"
        [highlighted]="hoveredFrame() === l.frame"
        (openLoadout)="openLoadoutById($event)"
        (createRequested)="createForFrame(l.frame)"
        (toggleFav)="toggleFavLoadout(l)"
        (hoverChange)="onFrameHover(l.frame, $event)"
      />
    }
  }
</div>

<div class="toast" [class.show]="toast()">{{ toast() }}</div>
