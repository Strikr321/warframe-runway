<!-- Data flows DOWN via [inputs], events bubble UP via (outputs). -->

<app-stats-banner
  [styled]="stats().styled"
  [total]="stats().total"
  [loadouts]="stats().loadouts"
  [favorites]="stats().favorites"
/>

<app-recent-row [loadouts]="recent()" (open)="openLoadout($event)" />

<app-controls-bar
  (viewChange)="view.set($event)"
  (searchChange)="search.set($event)"
  (filterChange)="filter.set($event)"
/>

<div class="card-grid">
  <!-- Create card — always first. Owned by the page: it never repeats
       elsewhere, so it doesn't earn its own component. -->
  <div class="card-slot">
    <div class="create-card" (click)="newLoadout()">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <div class="create-card-label">New Loadout</div>
    </div>
  </div>

  @if (view() === 'frame') {
    <!-- By Warframe: one card per frame, 64 stamps of the same component -->
    @for (frame of filteredFrames(); track frame) {
      <app-frame-card
        [frame]="frame"
        [loadouts]="loadoutsFor(frame)"
        (open)="openFrame(frame)"
        (toggleFav)="toggleFav(frame)"
      />
    }
  } @else {
    <!-- By Loadout: one card per loadout; badge off (always exactly 1) -->
    @for (l of filteredLoadouts(); track l.id) {
      <app-frame-card
        [frame]="l.frame"
        [loadouts]="[l]"
        [badge]="false"
        (open)="openLoadout(l)"
      />
    }
  }
</div>

<!-- Toast — [class.show] toggles the slide-up animation -->
<div class="toast" [class.show]="toast()">{{ toast() }}</div>
